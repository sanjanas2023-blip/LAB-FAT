apiVersion: apps/v1
kind: Deployment
metadata:
  name: university-dept-deployment
  labels:
    app: university-web
spec:
  replicas: 2 # Runs 2 pods for high availability
  selector:
    matchLabels:
      app: university-web
  template:
    metadata:
      labels:
        app: university-web
    spec:
      containers:
      - name: university-container
    
        image: university-dept-web:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80

---


apiVersion: v1
kind: Service
metadata:
  name: university-dept-service
spec:
  selector:
    app: university-web

  type: LoadBalancer 
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
